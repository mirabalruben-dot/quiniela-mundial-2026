<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña - Quiniela Insurance USA 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; margin: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header { background: linear-gradient(135deg, #0a1f4a, #1a3a6b); padding: 24px; border-radius: 12px; text-align: center; margin-bottom: 24px; }
  .header h1 { color: white; font-size: 1.1rem; margin-top: 8px; }
  .header p { color: rgba(255,255,255,0.75); font-size: 0.8rem; margin-top: 4px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #555; }
  input { width: 100%; padding: 10px 14px; border: 1.5px solid #dde5dd; border-radius: 10px; font-size: 0.95rem; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #1a3a6b; }
  .btn { width: 100%; padding: 14px; background: #1a3a6b; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .btn:hover { background: #122d56; }
  .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9rem; }
  .alert-success { background: #d4edda; color: #155724; }
  .alert-error { background: #f8d7da; color: #721c24; }
  .back { text-align: center; margin-top: 16px; font-size: 0.85rem; }
  .back a { color: #1a3a6b; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div style="font-size:2rem;">⚽</div>
    <h1>QUINIELA INSURANCE USA 2026</h1>
    <p>Restablecer contraseña</p>
  </div>
  <div id="msg"></div>
  <div id="formReset">
    <label>Nueva contraseña</label>
    <input type="password" id="pass1" placeholder="Mínimo 6 caracteres">
    <label>Confirmar contraseña</label>
    <input type="password" id="pass2" placeholder="Repite la contraseña">
    <button class="btn" onclick="resetear()">🔑 Restablecer contraseña</button>
  </div>
  <div class="back"><a href="/">← Volver al inicio</a></div>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('formReset').style.display = 'none';
    document.getElementById('msg').innerHTML = '<div class="alert alert-error">Enlace inválido. <a href="/">Volver al inicio</a></div>';
  }

  async function resetear() {
    const pass1 = document.getElementById('pass1').value;
    const pass2 = document.getElementById('pass2').value;
    const msg = document.getElementById('msg');

    if (pass1.length < 6) return msg.innerHTML = '<div class="alert alert-error">La contraseña debe tener al menos 6 caracteres</div>';
    if (pass1 !== pass2) return msg.innerHTML = '<div class="alert alert-error">Las contraseñas no coinciden</div>';

    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pass1 })
    }).then(r => r.json());

    if (r.ok) {
      document.getElementById('formReset').style.display = 'none';
      msg.innerHTML = '<div class="alert alert-success">✅ ¡Contraseña restablecida! <a href="/">Iniciar sesión</a></div>';
    } else {
      msg.innerHTML = `<div class="alert alert-error">❌ ${r.error}</div>`;
    }
  }
</script>
</body>
</html>
